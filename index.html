<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Dread Pirate Roberts' Secret Number</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b1e33;
    --navy-deep:#071420;
    --parchment:#e8d9b5;
    --parchment-dark:#d8c69a;
    --gold:#c9a227;
    --rust:#8b2e2e;
    --ink:#1a1410;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, #15314f 0%, var(--navy) 45%, var(--navy-deep) 100%);
    background-color:var(--navy);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    font-family:'IM Fell English', serif;
    color:var(--ink);
  }
  .map{
    width:100%;
    max-width:520px;
    background:var(--parchment);
    background-image:
      radial-gradient(circle at 10% 15%, rgba(139,46,46,0.08) 0, transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(139,46,46,0.08) 0, transparent 40%);
    border:3px solid var(--ink);
    border-radius:4px;
    box-shadow:0 0 0 6px var(--navy-deep), 0 20px 50px rgba(0,0,0,0.5);
    padding:36px 32px 28px;
    position:relative;
  }
  .map::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px dashed var(--rust);
    opacity:0.35;
    pointer-events:none;
    border-radius:2px;
  }
  h1{
    font-family:'Pirata One', serif;
    font-size:30px;
    letter-spacing:1px;
    text-align:center;
    margin:0 0 4px;
    color:var(--ink);
  }
  .subtitle{
    text-align:center;
    font-style:italic;
    font-size:15px;
    color:#5a4a30;
    margin:0 0 22px;
  }
  .setup, .game, .result{ display:none; }
  .setup.active, .game.active, .result.active{ display:block; }

  .difficulty{
    display:flex;
    gap:14px;
    justify-content:center;
    margin:18px 0 8px;
  }
  .diff-btn{
    flex:1;
    font-family:'IM Fell English', serif;
    font-size:16px;
    padding:14px 10px;
    background:var(--parchment-dark);
    border:2px solid var(--ink);
    border-radius:3px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  .diff-btn:hover{ background:var(--gold); transform:translateY(-2px); }
  .diff-btn small{ display:block; font-style:italic; font-size:12px; margin-top:4px; color:#4a3a20; }

  .compass-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin:18px 0;
  }
  .parrot{
    font-size:54px;
    transform:rotate(-8deg);
    transition:transform .25s ease;
  }
  .parrot.low{ transform:rotate(20deg) scaleY(0.95); }
  .parrot.high{ transform:rotate(-20deg) scaleY(0.95); }
  .parrot.win{ transform:rotate(0) scale(1.15); }

  .bubble{
    background:#fff8e8;
    border:2px solid var(--ink);
    border-radius:8px;
    padding:10px 14px;
    font-size:15px;
    min-height:24px;
    position:relative;
    max-width:260px;
  }
  .bubble::after{
    content:"";
    position:absolute;
    left:-10px;
    top:18px;
    border:7px solid transparent;
    border-right-color:var(--ink);
  }
  .bubble::before{
    content:"";
    position:absolute;
    left:-7px;
    top:18px;
    border:6px solid transparent;
    border-right-color:#fff8e8;
    z-index:1;
  }

  .range-bar{
    height:10px;
    background:var(--ink);
    border-radius:6px;
    position:relative;
    margin:6px 4px 4px;
    overflow:hidden;
  }
  .range-fill{
    position:absolute;
    top:0; bottom:0;
    background:var(--rust);
    transition:left .3s ease, right .3s ease;
  }
  .range-labels{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:#4a3a20;
    margin:0 4px 18px;
  }

  .tries{
    display:flex;
    gap:6px;
    justify-content:center;
    margin-bottom:18px;
  }
  .tries span{
    width:22px; height:22px;
    border-radius:50%;
    background:var(--gold);
    border:2px solid var(--ink);
    display:inline-block;
  }
  .tries span.used{ background:transparent; opacity:.3; }

  .input-row{
    display:flex;
    gap:10px;
  }
  input[type=number]{
    flex:1;
    font-family:'IM Fell English', serif;
    font-size:18px;
    padding:10px 12px;
    border:2px solid var(--ink);
    border-radius:3px;
    background:#fffaf0;
  }
  button{
    font-family:'Pirata One', serif;
    font-size:16px;
    padding:10px 20px;
    background:var(--rust);
    color:var(--parchment);
    border:2px solid var(--ink);
    border-radius:3px;
    cursor:pointer;
  }
  button:hover{ filter:brightness(1.1); }
  button.secondary{ background:var(--navy); }

  .result h2{
    font-family:'Pirata One', serif;
    text-align:center;
    font-size:26px;
    margin-bottom:6px;
  }
  .result p{ text-align:center; font-size:16px; margin:4px 0; }
  .result .actions{ display:flex; justify-content:center; margin-top:16px; }
</style>
</head>
<body>

<div class="map">
  <h1>☠ Dread Pirate Roberts' Secret Number ☠</h1>
  <p class="subtitle">find me treasure afore yer rope runs out, matey</p>

  <div class="setup active" id="setup">
    <div class="difficulty">
      <div class="diff-btn" onclick="startGame(50)">Easy<small>1 – 50</small></div>
      <div class="diff-btn" onclick="startGame(99)">Hard<small>1 – 99</small></div>
    </div>
  </div>

  <div class="game" id="game">
    <div class="compass-row">
      <div class="parrot" id="parrot">🦜</div>
      <div class="bubble" id="bubble">ahoy! make yer first guess.</div>
    </div>

    <div class="range-bar"><div class="range-fill" id="rangeFill"></div></div>
    <div class="range-labels"><span id="rangeLo">1</span><span id="rangeHi">99</span></div>

    <div class="tries" id="tries"></div>

    <div class="input-row">
      <input type="number" id="guessInput" placeholder="yer guess..." />
      <button onclick="submitGuess()">Guess</button>
    </div>
  </div>

  <div class="result" id="result">
    <h2 id="resultTitle"></h2>
    <p id="resultText"></p>
    <div class="actions"><button class="secondary" onclick="reset()">Sail Again</button></div>
  </div>
</div>

<script>
let secret, tries, maxTries, low, high, range;

function startGame(rangeMax){
  secret = Math.floor(Math.random() * rangeMax) + 1;
  tries = 0;
  maxTries = 6;
  low = 1; high = rangeMax; range = rangeMax;

  document.getElementById('rangeHi').textContent = rangeMax;
  document.getElementById('setup').classList.remove('active');
  document.getElementById('game').classList.add('active');
  document.getElementById('result').classList.remove('active');

  renderTries();
  updateBubble('ahoy! make yer first guess.', 'idle');
  updateRangeBar();
  document.getElementById('guessInput').value = '';
  document.getElementById('guessInput').focus();
}

function renderTries(){
  const box = document.getElementById('tries');
  box.innerHTML = '';
  for(let i=0;i<maxTries;i++){
    const dot = document.createElement('span');
    if(i < tries) dot.classList.add('used');
    box.appendChild(dot);
  }
}

function updateBubble(text, mood){
  document.getElementById('bubble').textContent = text;
  const parrot = document.getElementById('parrot');
  parrot.className = 'parrot' + (mood !== 'idle' ? ' ' + mood : '');
}

function updateRangeBar(){
  const fill = document.getElementById('rangeFill');
  const leftPct = ((low - 1) / (range - 1)) * 100;
  const rightPct = 100 - ((high - 1) / (range - 1)) * 100;
  fill.style.left = leftPct + '%';
  fill.style.right = rightPct + '%';
  document.getElementById('rangeLo').textContent = low;
  document.getElementById('rangeHi').textContent = high;
}

function submitGuess(){
  const input = document.getElementById('guessInput');
  const guess = parseInt(input.value, 10);
  if(isNaN(guess)) return;

  tries++;

  if(guess === secret){
    updateBubble('avast! ye found it!', 'win');
    renderTries();
    finish(true);
    return;
  }

  if(guess < secret){
    low = Math.max(low, guess + 1);
    updateBubble('too low, ye scurvy dog!', 'low');
  } else {
    high = Math.min(high, guess - 1);
    updateBubble('too high, landlubber!', 'high');
  }
  updateRangeBar();
  renderTries();
  input.value = '';

  if(tries >= maxTries){
    finish(false);
  }
}

function finish(won){
  document.getElementById('game').classList.remove('active');
  document.getElementById('result').classList.add('active');
  if(won){
    document.getElementById('resultTitle').textContent = '🏆 Treasure Found!';
    document.getElementById('resultText').textContent =
      `ye got it in ${tries} ${tries === 1 ? 'try' : 'tries'}! the secret number was ${secret}.`;
  } else {
    document.getElementById('resultTitle').textContent = '⚓ No More Guesses';
    document.getElementById('resultText').textContent =
      `better luck next time, matey. the secret number was ${secret}.`;
  }
}

function reset(){
  document.getElementById('result').classList.remove('active');
  document.getElementById('setup').classList.add('active');
}

document.getElementById('guessInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') submitGuess();
});
</script>
</body>
</html>
